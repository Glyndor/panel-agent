name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.3.0)"
        required: true

permissions:
  contents: read

jobs:
  ci:
    uses: Glyndor/.github/.github/workflows/rust-ci.yml@c2cf3d74719451a7a11fa8e5fae3f4a3c4e37fe6 # main

  build:
    name: Build ${{ matrix.arch }}
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust-target: x86_64-unknown-linux-musl
            use_cross: false

          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.rust-target }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: rust-release-${{ matrix.arch }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-release-${{ matrix.arch }}-${{ runner.os }}-

      - name: Install musl toolchain (x86_64)
        if: ${{ !matrix.use_cross }}
        run: sudo apt-get install -y musl-tools

      - name: Install cross (arm64)
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Set version from tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"${VERSION}\"/}" Cargo.toml
          echo "Set agent version to ${VERSION}"

      - name: Build agent (musl static)
        env:
          SQLX_OFFLINE: "true"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.rust-target }}
          else
            cargo build --release --target ${{ matrix.rust-target }}
          fi

      - name: Sign agent binary
        env:
          RELEASE_SIGN_KEY: ${{ secrets.RELEASE_SIGN_KEY }}
        run: |
          pip install --quiet cryptography
          BINARY="target/${{ matrix.rust-target }}/release/lynx-agent"
          ARTIFACT="lynx-agent-linux-${{ matrix.arch }}"
          cp "$BINARY" "$ARTIFACT"
          python3 .github/scripts/sign.py "$RELEASE_SIGN_KEY" "$ARTIFACT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: lynx-agent-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-${{ matrix.arch }}
          path: |
            lynx-agent-linux-${{ matrix.arch }}
            lynx-agent-linux-${{ matrix.arch }}.sig
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            lynx-agent-linux-x86_64 \
            lynx-agent-linux-x86_64.sig \
            lynx-agent-linux-arm64 \
            lynx-agent-linux-arm64.sig
